<svg viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes regionGlow { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.9; } }
      @keyframes pinBounce { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
      @keyframes lineFlow { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.6; } }
      .map-region { animation: regionGlow 3s ease-in-out infinite; }
      .map-region-1 { animation-delay: 0s; }
      .map-region-2 { animation-delay: 1s; }
      .map-region-3 { animation-delay: 2s; }
      .pin { animation: pinBounce 2s ease-in-out infinite; }
      .pin-1 { animation-delay: 0s; }
      .pin-2 { animation-delay: 0.4s; }
      .pin-3 { animation-delay: 0.8s; }
      .connection-line { animation: lineFlow 3s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="280" fill="url(#bgGrad2)"/>

  <!-- Map pattern background -->
  <defs>
    <pattern id="mapPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 0 20 L 20 0 L 40 20 L 20 40 Z" fill="none" stroke="rgba(16, 185, 129, 0.1)" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect x="600" y="0" width="600" height="280" fill="url(#mapPattern)" opacity="0.3"/>

  <!-- Content -->
  <line x="80" y="100" x2="128" y2="100" stroke="url(#accentGrad)" stroke-width="3" rx="2"/>
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>

  <text x="80" y="160" font-size="52" font-weight="800" fill="white" letter-spacing="-0.5" font-family="Hoefler Text, Georgia, serif">Address</text>
  <text x="80" y="210" font-size="15" fill="rgba(255,255,255,0.8)" font-weight="500">Manage addresses, locations, and countries across your site with structured, queryable location data.</text>

  <!-- World map visualization -->
  <g transform="translate(850, 60)">
    <!-- Map regions -->
    <g class="map-region map-region-1">
      <path d="M 40 30 L 70 25 L 75 50 L 60 60 L 40 55 Z" fill="#10b981" opacity="0.4" stroke="rgba(16, 185, 129, 0.6)" stroke-width="0.5"/>
    </g>

    <g class="map-region map-region-2">
      <path d="M 110 20 L 135 25 L 140 55 L 115 65 L 105 50 Z" fill="#06b6d4" opacity="0.4" stroke="rgba(6, 182, 212, 0.6)" stroke-width="0.5"/>
    </g>

    <g class="map-region map-region-3">
      <path d="M 150 30 L 190 35 L 195 60 L 160 65 L 145 50 Z" fill="#10b981" opacity="0.4" stroke="rgba(16, 185, 129, 0.6)" stroke-width="0.5"/>
    </g>

    <!-- Connection lines -->
    <line class="connection-line" x1="75" y1="50" x2="110" y2="45" stroke="rgba(6, 182, 212, 0.5)" stroke-width="1" stroke-dasharray="5,5"/>
    <line class="connection-line" x1="140" y1="55" x2="150" y2="50" stroke="rgba(16, 185, 129, 0.5)" stroke-width="1" stroke-dasharray="5,5"/>

    <!-- Location pins -->
    <g class="pin pin-1">
      <circle cx="55" cy="42" r="6" fill="rgba(16, 185, 129, 0.3)" stroke="#10b981" stroke-width="1"/>
      <circle cx="55" cy="42" r="2.5" fill="#10b981"/>
    </g>

    <g class="pin pin-2">
      <circle cx="125" cy="35" r="6" fill="rgba(6, 182, 212, 0.3)" stroke="#06b6d4" stroke-width="1"/>
      <circle cx="125" cy="35" r="2.5" fill="#06b6d4"/>
    </g>

    <g class="pin pin-3">
      <circle cx="170" cy="48" r="6" fill="rgba(16, 185, 129, 0.3)" stroke="#10b981" stroke-width="1"/>
      <circle cx="170" cy="48" r="2.5" fill="#10b981"/>
    </g>

    <!-- Coordinate grid -->
    <line x1="30" y1="80" x2="220" y2="80" stroke="#06b6d4" stroke-width="0.5" opacity="0.2"/>
    <line x1="125" y1="10" x2="125" y2="150" stroke="#06b6d4" stroke-width="0.5" opacity="0.2"/>

    <!-- Compass rose -->
    <g transform="translate(220, 30)" opacity="0.6">
      <circle cx="0" cy="0" r="8" fill="none" stroke="#06b6d4" stroke-width="0.5"/>
      <line x1="0" y1="-8" x2="0" y2="8" stroke="#06b6d4" stroke-width="0.5"/>
      <line x1="-8" y1="0" x2="8" y2="0" stroke="#06b6d4" stroke-width="0.5"/>
      <polygon points="0,-6 -1,-1 0,-2 1,-1" fill="#10b981"/>
    </g>

    <!-- Scale -->
    <g transform="translate(20, 140)" opacity="0.5">
      <line x1="0" y1="0" x2="30" y2="0" stroke="#06b6d4" stroke-width="0.5"/>
      <line x1="0" y1="-2" x2="0" y2="2" stroke="#06b6d4" stroke-width="0.5"/>
      <line x1="30" y1="-2" x2="30" y2="2" stroke="#06b6d4" stroke-width="0.5"/>
      <text x="15" y="10" font-size="6" fill="#06b6d4" text-anchor="middle">500 km</text>
    </g>
  </g>
</svg>
