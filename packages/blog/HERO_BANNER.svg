<svg viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes pageFlip { 0%, 10% { transform: rotateY(0deg) rotateZ(0deg); } 35%, 65% { transform: rotateY(-25deg) rotateZ(-2deg); } 90%, 100% { transform: rotateY(0deg) rotateZ(0deg); } }
      @keyframes textPulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }
      .page { animation: pageFlip 4s ease-in-out infinite; }
      .page-1 { animation-delay: 0s; }
      .page-2 { animation-delay: 1s; }
      .page-3 { animation-delay: 2s; }
      .text-line { animation: textPulse 2.5s ease-in-out infinite; }
      .text-line-1 { animation-delay: 0s; }
      .text-line-2 { animation-delay: 0.3s; }
      .text-line-3 { animation-delay: 0.6s; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="280" fill="#fafaf8"/>

  <!-- Accent glow -->
  <ellipse cx="1050" cy="140" rx="400" ry="200" fill="rgba(220, 130, 103, 0.08)"/>

  <!-- Content -->
  <line x="80" y="100" x2="112" y2="100" stroke="url(#dividerGrad)" stroke-width="2" rx="2"/>
  <defs>
    <linearGradient id="dividerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4644f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4644f;stop-opacity:0" />
    </linearGradient>
  </defs>

  <text x="80" y="160" font-size="56" font-weight="700" fill="#1a1a18" letter-spacing="-0.5" font-family="Hoefler Text, Georgia, serif">Blog</text>
  <text x="80" y="210" font-size="15" fill="#6b6b68" font-weight="400" letter-spacing="0.3">Publish and manage blog posts with built-in categories, tags, RSS feeds, and editorial workflows.</text>

  <!-- Pages visualization -->
  <g transform="translate(850, 60)">
    <!-- Page 3 (back) -->
    <g class="page page-3">
      <rect x="10" y="0" width="140" height="160" fill="white" stroke="#ddd" stroke-width="0.5" rx="2"/>
      <rect x="22" y="12" width="116" height="6" fill="#d4644f" opacity="0.3" rx="1"/>
      <rect x="22" y="25" width="116" height="3" fill="#ccc" rx="1"/>
      <rect x="22" y="32" width="116" height="3" fill="#ccc" rx="1"/>
      <rect x="22" y="39" width="116" height="3" fill="#ccc" rx="1"/>
      <rect x="22" y="52" width="80" height="3" fill="#ccc" rx="1"/>
    </g>

    <!-- Page 2 (middle) -->
    <g class="page page-2">
      <rect x="20" y="-5" width="140" height="160" fill="white" stroke="#d0d0d0" stroke-width="0.5" rx="2"/>
      <rect x="32" y="7" width="116" height="7" fill="#d4644f" rx="1"/>
      <rect x="32" y="22" width="116" height="3" fill="#ddd" rx="1"/>
      <rect x="32" y="29" width="116" height="3" fill="#ddd" rx="1"/>
      <rect x="32" y="36" width="116" height="3" fill="#ddd" rx="1"/>
      <rect x="32" y="50" width="90" height="3" fill="#ddd" rx="1"/>
      <circle cx="42" cy="72" r="4" fill="#d4644f" opacity="0.6"/>
      <text class="text-line text-line-1" x="55" y="76" font-size="8" fill="#999">Featured highlight</text>
    </g>

    <!-- Page 1 (front) -->
    <g class="page page-1">
      <rect x="30" y="-10" width="140" height="160" fill="white" stroke="#b0b0b0" stroke-width="1" rx="2"/>
      <rect x="42" y="2" width="116" height="8" fill="#d4644f" rx="1"/>
      <rect class="text-line text-line-1" x="42" y="17" width="116" height="2.5" fill="#e0e0e0" rx="1"/>
      <rect class="text-line text-line-2" x="42" y="23" width="116" height="2.5" fill="#e0e0e0" rx="1"/>
      <rect class="text-line text-line-3" x="42" y="29" width="90" height="2.5" fill="#e0e0e0" rx="1"/>
      <rect x="42" y="42" width="28" height="14" fill="rgba(212, 100, 79, 0.1)" stroke="#d4644f" stroke-width="0.5" rx="7"/>
      <text x="56" y="52" font-size="7" fill="#d4644f" text-anchor="middle" font-weight="600">Design</text>
      <rect x="78" y="42" width="28" height="14" fill="rgba(212, 100, 79, 0.1)" stroke="#d4644f" stroke-width="0.5" rx="7"/>
      <text x="92" y="52" font-size="7" fill="#d4644f" text-anchor="middle" font-weight="600">Web</text>
      <line x1="42" y1="62" x2="130" y2="62" stroke="#d4644f" stroke-width="1" opacity="0.3"/>
      <text x="42" y="85" font-size="6" fill="#999">Mar 15, 2024</text>
      <text x="42" y="105" font-size="7" fill="#666" font-weight="600">By Editorial Team</text>
    </g>

    <!-- Bookmark -->
    <rect x="175" y="-15" width="8" height="35" fill="#d4644f" rx="1" opacity="0.7"/>
    <polygon points="175,20 170,15 180,15" fill="#d4644f" opacity="0.7"/>
  </g>
</svg>
