exclude: ^(node_modules|vendor)/
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.3.0
    hooks:
      - id: check-byte-order-marker
      - id: check-case-conflict
      - id: check-json
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
      - id: check-added-large-files
      - id: detect-private-key

  - repo: local
    hooks:
      - id: donotcommit
        name: DO NOT COMMIT check
        entry: 'do not commit|DO NOT COMMIT'
        args: [--multiline]
        language: pygrep
        types: [text]
      - id: checkfordebugging
        name: check for debugging methods
        description: 'Check the dd(), debug(), dump() or any ray() methods have not been left in'
        entry: '[\s>@]dd\(|[\s>@]debug\(|[\s>@]dump\(|[\s>@]ray\(|[\s>@]rd\(|[\s]die\(|[\s]exit\(|[\s>@]ddRawSql\('
        language: pygrep
        types: [text]
      - id: pint
        name: Laravel Pint
        description: Run Laravel Pint against all staged PHP files.
        entry: .pre-commit/pint.sh
        language: script
        types: [php]
      - id: prettier
        name: Format code with Prettier
        entry: .pre-commit/prettier.sh
        language: script
        files: \.blade\.php$|\.css$|\.js$|\.yml$
        stages: [pre-commit]
