name: Coverage Release

on:
  push:
    tags:
      - '*'

jobs:
  pest-coverage-release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: [8.4]
        laravel: [11.*]
        db: [sqlite]
    env:
      COMPOSER_AUTH: '{"github-oauth": {"github.com": "${{ secrets.ACCESS_TOKEN }}"} }'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: curl, dom, fileinfo, intl, json, libxml, mbstring, simplexml, zip, pcov
          tools: composer:v2
          coverage: pcov

      - name: Pin path package versions
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          php <<'PHP'
          <?php

          declare(strict_types=1);

          $version = ltrim((string) getenv('RELEASE_VERSION'), 'v');
          $composerFile = 'composer.json';
          $composer = json_decode((string) file_get_contents($composerFile), true, flags: JSON_THROW_ON_ERROR);

          foreach ($composer['repositories'] as &$repository) {
              if (($repository['type'] ?? null) !== 'path') {
                  continue;
              }

              $repository['options']['versions'] ??= [];

              foreach (glob($repository['url'] . '/composer.json') ?: [] as $packageComposerFile) {
                  $packageComposer = json_decode((string) file_get_contents($packageComposerFile), true, flags: JSON_THROW_ON_ERROR);
                  $packageName = $packageComposer['name'] ?? null;

                  if (is_string($packageName) && $packageName !== '') {
                      $repository['options']['versions'][$packageName] = $version;
                  }
              }
          }

          file_put_contents(
              $composerFile,
              json_encode($composer, JSON_PRETTY_PRINT | JSON_UNESCAPED_SLASHES | JSON_THROW_ON_ERROR) . PHP_EOL,
          );
          PHP

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --ansi --optimize-autoloader

      - name: Configure environment
        run: |
          echo "DB_CONNECTION=sqlite" >> .env
          echo "DB_DATABASE=:memory:" >> .env

      - name: Run Pest Coverage (Clover via pipelines config)
        run: php -d memory_limit=-1 -d pcov.enabled=1 -d pcov.directory=packages -d pcov.exclude="~vendor|tests|storage|bootstrap|.temp~" vendor/bin/pest --coverage --coverage-clover=coverage/clover.xml --colors=always --configuration=phpunit-pipelines.xml

      - name: Upload Clover XML for codecov
        uses: actions/upload-artifact@v7
        with:
          name: pest-coverage-clover
          path: coverage/clover.xml
