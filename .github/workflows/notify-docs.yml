name: Notify docs site

on:
  push:
    branches:
      - main
      - 4.x
    paths:
      - docs/**
      - packages/**/docs/**
      - packages/**/README.md
      - '!docs/internal/**'
      - '!docs/specs/**'
      - '!docs/superpowers/**'
      - '!packages/**/docs/internal/**'
      - '!packages/**/docs/specs/**'
      - '!packages/**/docs/superpowers/**'
  pull_request:
    paths:
      - docs/**
      - packages/**/docs/**
      - packages/**/README.md
      - '!docs/internal/**'
      - '!docs/specs/**'
      - '!docs/superpowers/**'
      - '!packages/**/docs/internal/**'
      - '!packages/**/docs/specs/**'
      - '!packages/**/docs/superpowers/**'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  dispatch:
    name: Trigger capell-docs rebuild
    runs-on: ubuntu-latest
    env:
      DOCS_DISPATCH_TOKEN: ${{ secrets.ACCESS_TOKEN || secrets.DOCS_DISPATCH_TOKEN }}
    steps:
      - name: Prepare docs dispatch payload
        id: payload
        uses: actions/github-script@v9
        with:
          script: |
            const payload = {
              source: context.repo.repo,
              ref: context.ref,
              sha: context.sha,
            };

            if (context.eventName === 'release') {
              payload.tag = context.ref.replace('refs/tags/', '');
              payload.release_url = context.payload.release.html_url;
            }

            core.setOutput('json', JSON.stringify(payload));
            core.info(`Prepared docs-update payload: ${JSON.stringify(payload)}`);

      - name: Validate pull request docs notification
        if: github.event_name == 'pull_request'
        run: |
          echo 'Pull request dry run only. Payload:'
          echo '${{ steps.payload.outputs.json }}'

      - name: Send repository_dispatch to capell-docs
        if: github.event_name != 'pull_request'
        uses: actions/github-script@v9
        with:
          github-token: ${{ env.DOCS_DISPATCH_TOKEN }}
          script: |
            if (!process.env.DOCS_DISPATCH_TOKEN) {
              core.setFailed('Missing ACCESS_TOKEN or DOCS_DISPATCH_TOKEN secret.');
              return;
            }

            const client_payload = JSON.parse(`${{ steps.payload.outputs.json }}`);

            await github.rest.repos.createDispatchEvent({
              owner: 'capell-app',
              repo: 'capell-docs',
              event_type: 'docs-update',
              client_payload,
            });
            core.info(`Dispatched docs-update from ${context.repo.repo}@${context.ref}`);
