name: Coverage

on:
  push:
    branches: [master, main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  coverage-minimum:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: [8.4]
        laravel: [11.*]
        db: [sqlite]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: curl, dom, fileinfo, intl, json, libxml, mbstring, simplexml, zip, pcov
          tools: composer:v2
          coverage: pcov

      - name: Install PHP dependencies
        run: composer install --no-interaction --no-progress --ansi --optimize-autoloader

      - name: Configure environment
        run: |
          echo "DB_CONNECTION=sqlite" >> .env
          echo "DB_DATABASE=:memory:" >> .env

      - name: Enforce minimum coverage using Pest pipelines
        run: php -d memory_limit=-1 -d pcov.enabled=1 -d pcov.directory=packages vendor/bin/pest --coverage --min=80 --colors=always --configuration=phpunit-pipelines.xml
